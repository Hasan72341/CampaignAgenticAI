services:
  - type: web
    name: campaignx-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        sync: false
      - key: HACKATHON_API_KEY
        sync: false
      - key: HACKATHON_TEAM_NAME
        sync: false
      - key: HACKATHON_TEAM_EMAIL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
